<!DOCTYPE html>
<html>
<head>
    <title>AudioMarker</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
    <h1>AudioMarker</h1>

    <div id="button-container">
        <button id="start-recognition">Start Recording</button>
        <button id="stop-recognition" style="display: none;">Stop Recording</button>
        <button id="reset-checkboxes">Reset Checkboxes</button>
    </div>
    <button id="language-toggle">Sprache auf Deutsch wechseln</button>

    <div id="progress-container">
        <span id="progress-label">0 / 24 checked</span>
        <div id="progress-bar-track">
            <div id="progress-bar-fill"></div>
        </div>
    </div>

    <div id="console-log" class="hidden">Console Log</div>
    <div id="output" class="hidden">
        <div id="wakeLockAPIAvailable"></div>
    </div>

    <div id="table-wrapper">
        <table id="number-table">
            <thead>
                <tr>
                    <th>Number</th>
                    <th>Check</th>
                </tr>
            </thead>
            <tbody>
                <tr data-number="2"><td>2</td><td><input type="checkbox" id="check-2" disabled></td></tr>
